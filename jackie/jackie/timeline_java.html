<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive JavaScript Timeline</title>

    <style>
        /* Base styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 40px;
            color: #333;
        }

        /* Timeline Container */
        .timeline {
            position: relative;
            max-width: 800px;
            width: 100%;
        }

        /* The central vertical spine */
        .timeline::after {
            content: '';
            position: absolute;
            width: 4px;
            background-color: #1abc9c;
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -2px;
        }

        /* Timeline Item Wrapper */
        .timeline-item {
            padding: 10px 40px;
            position: relative;
            background-color: inherit;
            width: 50%;
        }

        /* The interactive indicator dots */
        .timeline-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            right: -8px;
            background-color: #fff;
            border: 4px solid hsl(313, 100%, 87%);
            top: 15px;
            border-radius: 50%;
            z-index: 1;
            transition: background-color 0.3s ease;
        }

        /* Alternating left/right positioning */
        .left {
            left: 0;
        }

        .right {
            left: 50%;
        }

        .right .timeline-dot {
            left: -8px;
        }

        /* Content Card */
        .content {
            padding: 20px 30px;
            background-color: white;
            position: relative;
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .content:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .content h2 {
            font-size: 1.2rem;
            color: #7ee4f7;
            margin-bottom: 8px;
        }

        .content p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Active styling applied by JS interaction */
        .content.active {
            border-left: 5px solid hsl(212, 100%, 73%);
            background-color: hsl(214, 100%, 95%);
        }
        
        .timeline-item.active .timeline-dot {
            background-color: hsl(308, 100%, 88%);
        }

        /* Responsive constraints for smaller monitors and screens */
        @media screen and (max-width: 600px) {
            .timeline::after {
                left: 31px;
            }
            .timeline-item {
                width: 100%;
                padding-left: 70px;
                padding-right: 25px;
            }
            .left, .right {
                left: 0;
            }
            .timeline-dot {
                left: 23px !important;
            }
        }
    </style>
</head>
<body>
    
    <h1>My Softball Timeline</h1>

    <!-- The DOM target where our script injects items -->
    <div class="timeline" id="timelineContainer"></div>

    <script>
        // 1. Structured Timeline Data Object Array
        const timelineData = [
            { date: "2018", text: "An accidental chance, I joined the extracurricular class of softball in my primary school. I even do not know what is this, and I only join it as fun." },
            { date: "2019", text: "My first time to represent Hong Kong, formed from mine and other school team. It was U12 Asian Pacicfic Cup in Jakarwta." },
            { date: "Phase 3: Q3 2026", text: "Launch comprehensive beta software testing track with select system control user groups." },
            { date: "Phase 4: Q4 2026", text: "Inaugurate public system deployment rollout alongside monitored optimization frameworks." }
        ];

        // 2. Reference targeted HTML container
        const container = document.getElementById('timelineContainer');

        // 3. Dynamic Rendering Pipeline Loop
        timelineData.forEach((item, index) => {
            // Instantiate wrapper
            const itemDiv = document.createElement('div');
            itemDiv.classList.add('timeline-item');
            
            // Alternate classes horizontally based on entry index
            if (index % 2 === 0) {
                itemDiv.classList.add('left');
            } else {
                itemDiv.classList.add('right');
            }

            // Create structural visual components
            const dot = document.createElement('div');
            dot.classList.add('timeline-dot');

            const content = document.createElement('div');
            content.classList.add('content');

            // Inject data fields safely via textContent API
            const header = document.createElement('h2');
            header.textContent = item.date;

            const bodyText = document.createElement('p');
            bodyText.textContent = item.text;

            // Assemble DOM component fragments tree
            content.appendChild(header);
            content.appendChild(bodyText);
            itemDiv.appendChild(dot);
            itemDiv.appendChild(content);
            
            // Append finished component into host viewport
            container.appendChild(itemDiv);

            // 4. Client-side Interaction Event Handlers
            content.addEventListener('click', () => {
                // Clear any pre-existing highlighted item states
                document.querySelectorAll('.timeline-item, .content').forEach(el => {
                    el.classList.remove('active');
                });
                // Target current component elements to activate highlights
                itemDiv.classList.add('active');
                content.classList.add('active');
            });
        });
    </script>
    
</body>
</html>
