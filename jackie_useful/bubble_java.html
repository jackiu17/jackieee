<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clustered Bubble Chart Example</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        #container {
            width: 100%;
            max-width: 900px;
            height: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
    <!-- Core Highcharts library -->
    <script src="https://highcharts.com"></script>
    <!-- Highcharts More module (required for bubble charts) -->
    <script src="https://highcharts.com"></script>
    <!-- Accessibility module (required for charts to function properly) -->
    <script src="https://highcharts.com"></script>
</head>
<body>

    <div id="container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Highcharts.chart('container', {
                chart: {
                    type: 'packedbubble', // Sets the layout to a packed/clustered physics structure
                    height: '100%'
                },
                title: {
                    text: 'Market Share Breakdown by Industry',
                    align: 'left'
                },
                tooltip: {
                    useHTML: true,
                    pointFormat: '<b>{point.name}:</b> {point.value} million units'
                },
                plotOptions: {
                    packedbubble: {
                        minSize: '30%',
                        maxSize: '120%',
                        zMin: 0,
                        zMax: 1000,
                        layoutAlgorithm: {
                            splitSeries: true, // Forces bubbles to group/cluster by their parent series
                            gravitationalConstant: 0.02,
                            seriesInteraction: true,
                            dragBetweenSeries: true, // Allows you to drag bubbles between clusters dynamically
                            parentNodeLimit: true
                        },
                        dataLabels: {
                            enabled: true,
                            format: '{point.name}',
                            style: {
                                color: 'black',
                                textOutline: 'none',
                                fontWeight: 'normal'
                            }
                        }
                    }
                },
                // Define your clusters as series, and data elements as bubbles inside them
                series: [{
                    name: 'Technology',
                    data: [
                        { name: 'Apple', value: 800 },
                        { name: 'Google', value: 650 },
                        { name: 'Microsoft', value: 500 },
                        { name: 'Meta', value: 300 },
                        { name: 'Nvidia', value: 250 }
                    ]
                }, {
                    name: 'Automotive',
                    data: [
                        { name: 'Tesla', value: 450 },
                        { name: 'Toyota', value: 400 },
                        { name: 'Ford', value: 200 },
                        { name: 'BMW', value: 150 }
                    ]
                }, {
                    name: 'Finance',
                    data: [
                        { name: 'Visa', value: 380 },
                        { name: 'JPMorgan', value: 340 },
                        { name: 'Mastercard', value: 290 },
                        { name: 'Citi', value: 120 }
                    ]
                }]
            });
        });
    </script>
</body>
</html>
