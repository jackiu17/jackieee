<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clustered Bubble Chart</title>
    <!-- Load D3.js Library from CDN -->
    <script src="https://d3js.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
        }
        #chart {
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .bubble {
            stroke: #fff;
            stroke-width: 2px;
            cursor: pointer;
            transition: stroke 0.2s;
        }
        .bubble:hover {
            stroke: #000;
        }
        .label {
            font-size: 11px;
            text-anchor: middle;
            pointer-events: none;
            fill: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="chart"></div>

    <script>
        // 1. Setup dimensions and data
        const width = 800;
        const height = 500;

        // Sample data with three groups (Clusters)
        const data = [
            { name: "Apple", group: "Fruit", value: 50 },
            { name: "Banana", group: "Fruit", value: 35 },
            { name: "Orange", group: "Fruit", value: 40 },
            { name: "Cherry", group: "Fruit", value: 20 },
            
            { name: "Carrot", group: "Vegetable", value: 45 },
            { name: "Broccoli", group: "Vegetable", value: 30 },
            { name: "Potato", group: "Vegetable", value: 55 },
            
            { name: "Milk", group: "Dairy", value: 60 },
            { name: "Cheese", group: "Dairy", value: 40 },
            { name: "Yogurt", group: "Dairy", value: 25 }
        ];

        // 2. Define cluster centers for each group
        const centers = {
            "Fruit": { x: 200, y: 250 },
            "Vegetable": { x: 400, y: 250 },
            "Dairy": { x: 600, y: 250 }
        };

        // 3. Color scale for clusters
        const colorScale = d3.scaleOrdinal()
            .domain(["Fruit", "Vegetable", "Dairy"])
            .range(["#ff6b6b", "#51cf66", "#339af0"]);

        // 4. Scale for bubble sizes (maps data value to circle radius)
        const radiusScale = d3.scaleSqrt()
            .domain([0, d3.max(data, d => d.value)])
            .range([10, 55]);

        // 5. Create SVG Container
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        // 6. Draw cluster labels
        svg.selectAll(".cluster-title")
            .data(Object.keys(centers))
            .enter()
            .append("text")
            .attr("class", "cluster-title")
            .attr("x", d => centers[d].x)
            .attr("y", 70)
            .attr("text-anchor", "middle")
            .style("font-size", "16px")
            .style("fill", "#666")
            .text(d => d);

        // 7. Initialize Force Simulation
        const simulation = d3.forceSimulation(data)
            // Push nodes toward their specific group center
            .force("x", d => d3.forceX(centers[d.group].x).strength(0.4))
            .force("y", d => d3.forceY(centers[d.group].y).strength(0.4))
            // Prevent bubbles from overlapping (+2 pixels for padding)
            .force("collision", d => d3.forceCollide(radiusScale(d.value) + 2))
            .on("tick", ticked);

        // 8. Create graphical groups for bubbles and text labels
        const node = svg.selectAll(".node")
            .data(data)
            .enter()
            .append("g")
            .attr("class", "node");

        // Append the circles
        const circles = node.append("circle")
            .attr("class", "bubble")
            .attr("r", d => radiusScale(d.value))
            .attr("fill", d => colorScale(d.group));

        // Append text inside the circles
        const labels = node.append("text")
            .attr("class", "label")
            .text(d => d.name)
            .attr("dy", ".3em"); // Center vertically

        // 9. Update positions on every physics calculation ("tick")
        function ticked() {
            node.attr("transform", d => `translate(${d.x}, ${d.y})`);
        }
    </script>
</body>
</html>
